apiVersion: v1
kind: Deployment
metadata:
  name: myntra-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myntra
  template:
    metadata:
      labels:
        app: myntra
    spec:
      containers:
      - name: myntra
        image: satyasaia99/myntra:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: myntra-service
spec:
  type: NodePort
  selector:
    app: myntra
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30004
